        grading_lowest,
        Grading,
        ICD_ICD10,
        ICD_ICD10_3,
        ICD_ICD10Group,
        ICDO_histologyCode,
        ICDO_localizationCode,
        internal,
        metastasis,
        noGroup,
        organizationalUnit,
        patientCase,
        previousConsultation_genetic,
        previousConsultation_nutrition,
        previousConsultation_psycho,
        previousConsultation_social,
        previousDiagnostic_radiology,
        previousTherapy_radiation,
        previousTherapy_surgery,
        previousTherapy_systemic,
        previousTumorboard_any,
        previousTumorboard_prae,
        previousTumorboard_post,
        previousTumorboard_mtb,
        primaryCase,
        recurrence,
